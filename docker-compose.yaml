services:
  agent:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
    volumes:
      - ./workspace:/workspace
    mem_limit: 512m
    cpus: 1
    pids_limit: 100
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true